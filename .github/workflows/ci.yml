name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    # Surface a wedged test run as a clean failure at ~10min instead of
    # GitHub's 6h default — see #246 for the original 24-min hang.
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.20"

      - name: Install deps
        run: bun install

      - name: Cache ergo binary
        uses: actions/cache@v5
        with:
          path: var/ergo-bin
          key: ergo-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('bin/install-ergo') }}

      - name: Install ergo
        run: bin/install-ergo

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Shellcheck
        run: shellcheck bin/*

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Test with coverage
        run: bun test --coverage

      - name: Shell tests — start-dispatcher
        run: bash test/start-dispatcher_test.sh

      - name: Shell tests — stop-dispatcher
        run: bash test/stop-dispatcher_test.sh
